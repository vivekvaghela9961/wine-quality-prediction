name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-state-file: false
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Black
      run: |
        black --check .

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests with Coverage
      run: |
        pytest --cov=api --cov=src --cov-report=xml

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build-and-push-docker:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build API Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: api/Dockerfile
        push: false
        tags: wine-prediction-api:latest

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.frontend
        push: false
        tags: wine-prediction-frontend:latest

    # CD Deployment Step Placeholder for Render / Railway / Google Cloud Run
    # Example for deploying to Render or Google Cloud Run:
    # - name: Deploy to Cloud Run
    #   uses: google-github-actions/deploy-cloudrun@v1
    #   with:
    #     service: wine-quality-predictor
    #     image: gcr.io/my-project/wine-prediction-api:latest
